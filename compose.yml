services:
  astro:
    build: .
    container_name: portafolio
    restart: unless-stopped

    ports:
      - "${HOST_PORT}:${PORT}"

    environment:
      - NODE_ENV=production
      - PORT=${PORT}

    command: [ "pnpm", "preview", "--host", "0.0.0.0", "--port", "${PORT}" ]

    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${PORT}" ]
      interval: 30s
      timeout: 5s
      retries: 3
